<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forage Library</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f8f7f4">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <h1>Forage Library</h1>
    <div id="api-key-banner" class="api-key-banner hidden">
      <span>Enter API key to enable sync:</span>
      <input type="text" id="api-key-input" placeholder="API key">
      <button id="api-key-save">Save</button>
    </div>
    <div class="controls">
      <input type="text" id="search" placeholder="Search books..." autocomplete="off">
      <select id="filter">
        <option value="all">All</option>
        <option value="wishlist" selected>Wishlist</option>
        <option value="owned">Owned</option>
        <option value="reading">Reading</option>
        <option value="paused">Paused</option>
        <option value="read">Read</option>
      </select>
      <select id="tag-filter">
        <option value="all">All tags</option>
      </select>
    </div>
    <div class="sort-controls">
      Sort:
      <button data-sort="title">Title</button>
      <button data-sort="author">Author</button>
      <button data-sort="rating">Rating</button>
      <button data-sort="date_added" class="active">Date ▼</button>
    </div>
    <div class="sync-bar">
      <button id="sync-status" class="sync-btn">Checking...</button>
    </div>
    <div class="count" id="count"></div>
    <div id="books"></div>
    <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
      <div class="modal">
        <h2 id="modal-title">Add Book</h2>
        <form id="book-form">
          <label for="field-title">Title</label>
          <input type="text" id="field-title" required>
          <label for="field-author">Author</label>
          <input type="text" id="field-author" required>
          <div id="lookup-container"></div>
          <label for="field-status">Status</label>
          <select id="field-status">
            <option value="wishlist">Wishlist</option>
            <option value="owned">Owned</option>
            <option value="reading">Reading</option>
            <option value="paused">Paused</option>
            <option value="read">Read</option>
            <option value="dropped">Dropped</option>
          </select>
          <label for="field-rating">Rating</label>
          <select id="field-rating">
            <option value="0">No rating</option>
            <option value="1">1 star</option>
            <option value="2">2 stars</option>
            <option value="3">3 stars</option>
            <option value="4">4 stars</option>
            <option value="5">5 stars</option>
          </select>
          <label for="field-tags">Tags (comma-separated)</label>
          <input type="text" id="field-tags">
          <div id="subject-chips"></div>
          <label for="field-pages">Page count</label>
          <input type="text" id="field-pages" inputmode="numeric" pattern="[0-9]*">
          <label for="field-year">First published</label>
          <input type="text" id="field-year" inputmode="numeric" pattern="[0-9]*">
          <label for="field-isbn">ISBN</label>
          <input type="text" id="field-isbn">
          <label for="field-notes">Notes</label>
          <textarea id="field-notes" rows="3"></textarea>
          <div class="modal-actions">
            <button type="submit" class="btn-save">Save</button>
            <button type="button" class="btn-cancel">Cancel</button>
            <button type="button" class="btn-delete hidden">Delete</button>
          </div>
        </form>
      </div>
    </div>
    <button class="fab" id="fab-add" aria-label="Add book">+</button>
  </div>
  <script>
    window.__FORAGE_DATA__ = { books: [], booksellers: [] };
    window.__FORAGE_DATA_VERSION__ = "";
  </script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
